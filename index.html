<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Liberty IA — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f7f8fc;
  --surface:  #ffffff;
  --surface2: #f0f2f8;
  --border:   #e4e7f0;
  --accent:   #2452d4;
  --green:    #0a8f68;
  --orange:   #c96a00;
  --red:      #c62828;
  --text:     #111827;
  --sub:      #6b7280;
  --mono:     'IBM Plex Mono', monospace;
  --sans:     'Figtree', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 30px; height: 30px; background: var(--accent);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 13px; color: #fff; flex-shrink: 0;
  font-family: var(--mono);
}
.logo-text { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
.logo-text em { color: var(--accent); font-style: normal; }

.agency-tag {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 11px; border: 1px solid var(--border);
  border-radius: 99px; background: var(--surface2);
  font-family: var(--mono); font-size: 10px; color: var(--sub);
  max-width: 52%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

main { max-width: 660px; margin: 0 auto; padding: 28px 16px 64px; }

.section-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px;
}
.section-head h2 {
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; font-family: var(--mono);
  white-space: nowrap; color: var(--accent);
}
.section-head::after { content:''; flex:1; height:1px; background: var(--accent); opacity: .25; }

.section-head.vend h2 { color: var(--green); }
.section-head.vend::after { background: var(--green); opacity: .25; }

.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
.stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 12px; overflow: hidden; position: relative;
}
.stat::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
}
.stat.hot::before  { background: var(--red); }
.stat.warm::before { background: var(--orange); }
.stat.cold::before { background: var(--accent); }
.stat-label {
  font-size: 9px; font-family: var(--mono); letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 9px;
}
.stat.hot  .stat-label { color: var(--red); }
.stat.warm .stat-label { color: var(--orange); }
.stat.cold .stat-label { color: var(--accent); }
.stat-num { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -2px; }
.stat.hot  .stat-num { color: var(--red); }
.stat.warm .stat-num { color: var(--orange); }
.stat.cold .stat-num { color: var(--accent); }
.stat-hint { font-size: 10px; color: var(--sub); margin-top: 5px; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; margin-bottom: 32px;
}
.card-header {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface2);
}
.card-title { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.count-pill {
  font-family: var(--mono); font-size: 10px;
  padding: 2px 9px; border-radius: 99px;
  background: var(--surface); border: 1px solid var(--border); color: var(--sub);
}

.card.vend-card { border-color: rgba(10,143,104,.2); }
.card.vend-card .card-header { background: rgba(10,143,104,.05); border-bottom-color: rgba(10,143,104,.15); }

.rlist { list-style: none; }
.rrow {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.rrow:last-child { border-bottom: none; }
.rrow:hover { background: var(--surface2); }
.rleft { flex: 1; min-width: 0; }
.rname {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 5px;
}
.rmeta {
  display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
}
.chip {
  font-family: var(--mono); font-size: 9px; padding: 2px 6px;
  border-radius: 4px; background: var(--surface2); border: 1px solid var(--border);
  color: var(--sub); white-space: nowrap;
}
.ville { font-size: 11px; color: var(--sub); }
.delai-txt { font-size: 10px; color: var(--sub); font-family: var(--mono); }

.rright { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }

.badge {
  font-family: var(--mono); font-size: 9px; padding: 3px 9px;
  border-radius: 99px; font-weight: 500; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.badge::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; }
.b-hot  { background:rgba(198,40,40,.07);  color:var(--red);    border:1px solid rgba(198,40,40,.18); }
.b-warm { background:rgba(201,106,0,.07);  color:var(--orange); border:1px solid rgba(201,106,0,.18); }
.b-cold { background:rgba(36,82,212,.07);  color:var(--accent); border:1px solid rgba(36,82,212,.18); }

.price { font-family: var(--mono); font-size: 12px; color: var(--green); font-weight: 600; }
.ddate { font-family: var(--mono); font-size: 10px; color: var(--sub); }

.empty { padding: 32px 16px; text-align: center; color: var(--sub); font-size: 11px; font-family: var(--mono); }

footer {
  text-align: center; padding: 20px 16px;
  font-family: var(--mono); font-size: 10px; color: var(--sub);
  border-top: 1px solid var(--border);
}
footer strong { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">L</div>
    <div class="logo-text">Liberty <em>IA</em></div>
  </div>
  <div class="agency-tag">
    <div class="pulse"></div>
    <span id="agencyLabel">…</span>
  </div>
</header>

<main>

  <div class="section-head"><h2>Acquéreurs</h2></div>

  <div class="stats">
    <div class="stat hot">
      <div class="stat-label">Chauds</div>
      <div class="stat-num" id="cHot">—</div>
      <div class="stat-hint">Immédiat</div>
    </div>
    <div class="stat warm">
      <div class="stat-label">Tièdes</div>
      <div class="stat-num" id="cWarm">—</div>
      <div class="stat-hint">1–3 mois</div>
    </div>
    <div class="stat cold">
      <div class="stat-label">Froids</div>
      <div class="stat-num" id="cCold">—</div>
      <div class="stat-hint">3–6 mois</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">👤 Leads acquéreurs</div>
      <span class="count-pill" id="totalAcq">0</span>
    </div>
    <ul class="rlist" id="listAcq"><li class="empty">Chargement…</li></ul>
  </div>

  <div class="section-head vend"><h2>Vendeurs</h2></div>

  <div class="card vend-card">
    <div class="card-header">
      <div class="card-title">🏠 Biens à vendre</div>
      <span class="count-pill" id="totalVend">0</span>
    </div>
    <ul class="rlist" id="listVend"><li class="empty">Chargement…</li></ul>
  </div>

</main>

<footer>Dashboard <strong>Liberty IA</strong> · Accès sécurisé par agence</footer>

<script>
const ACQ_ID  = "1-kSmjWfoaHe6fJYt1Qbuj1ZEOA2V815zxHDrXQ0j_Kc";
const VEND_ID = "1m5WbIcjuj3LgsHnXO3rmxO2X5bdkCJ0-4mM6K3bs0XI";
const NAMES   = {
  VER:"Vercors Immobilier", AGD:"AGDA", FON:"Foncia",
  IMS:"Immosud", MIS:"Mistral Immo", ALG:"Alger Immo",
  RHO:"Rhones Immo", TNS:"Tunis Immo", BIG:"Big Ben Immo"
};

function getAgence(){ return (new URLSearchParams(location.search).get("agence")||"").toUpperCase(); }

async function fetchSheet(id, tab){
  const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`;
  const t = await (await fetch(url)).text();
  return JSON.parse(t.substring(47).slice(0,-2)).table;
}

function cv(row, i){
  if(!row.c || !row.c[i] || row.c[i].v === null || row.c[i].v === undefined) return "";
  const v = row.c[i].v;
  if(typeof v === "string" && v.startsWith("Date(")){
    const p = v.replace("Date(","").replace(")","").split(",");
    return `${String(p[2]).padStart(2,"0")}/${String(+p[1]+1).padStart(2,"0")}/${p[0]}`;
  }
  return String(v).trim();
}

function stripEmail(s){
  return s.replace(/\S+@\S+\.\S+/g,"").replace(/\s+/g," ").trim();
}

function parsePrix(raw){
  if(!raw) return null;
  const s = String(raw).toLowerCase().replace(/\s+/g,"").replace(/,/g,".");
  const wordsMap = {
    "unmillion":1000000,"deuxmillions":2000000,"deuxmillion":2000000,
    "unmilliard":1000000000,"cent":100,"mille":1000,"dixmille":10000,"centmille":100000,
  };
  for(const [w,n] of Object.entries(wordsMap)){
    if(s.replace(/[^a-z]/g,"") === w) return n;
  }
  const match = s.match(/^([\d.]+)\s*([a-z]*)/);
  if(!match) return null;
  let num = parseFloat(match[1]);
  if(isNaN(num)) return null;
  const suffix = match[2].replace(/euros?|dollars?|\$|€|eur/g,"");
  if(suffix === "k" || suffix === "millier") num *= 1_000;
  else if(suffix === "m" || suffix === "million" || suffix === "millions") num *= 1_000_000;
  else if(suffix === "milliard" || suffix === "milliards") num *= 1_000_000_000;
  return num;
}

function fmtPrix(raw){
  if(!raw) return "—";
  const n = parsePrix(raw);
  if(n === null) return "—";
  if(n >= 1_000_000) return (n/1_000_000).toLocaleString("fr-FR",{maximumFractionDigits:2}) + " M€";
  if(n >= 1_000) return n.toLocaleString("fr-FR") + " €";
  return n.toLocaleString("fr-FR") + " €";
}

function classifBadge(delai){
  const d = (delai||"").toLowerCase().replace(/\s/g,"");
  if(d.includes("immédiat") || d.includes("immediat"))
    return { cls:"b-hot",  label:"Chaud", type:"hot"  };
  if((d.includes("1") || d.includes("un")) && d.includes("3"))
    return { cls:"b-warm", label:"Tiède", type:"warm" };
  return   { cls:"b-cold", label:"Froid", type:"cold" };
}

async function loadAcq(ag){
  const el = document.getElementById("listAcq");
  try{
    const tbl = await fetchSheet(ACQ_ID, "Réponses au formulaire 2");
    const rows = (tbl.rows||[]).filter(r => cv(r,9).toUpperCase() === ag);
    let hot=0, warm=0, cold=0;
    const items = rows.map(r => {
      const prenom  = stripEmail(cv(r,1));
      const nom     = stripEmail(cv(r,2));
      const budget  = cv(r,3), secteur = cv(r,4), date = cv(r,0), delai = cv(r,7);
      const c = classifBadge(delai);
      if(c.type==="hot") hot++; else if(c.type==="warm") warm++; else cold++;
      return `<li class="rrow">
        <div class="rleft">
          <div class="rname">${prenom} ${nom}</div>
          <div class="rmeta">
            ${budget  ? `<span class="chip">${budget}</span>` : ""}
            ${secteur ? `<span class="ville">${secteur}</span>` : ""}
          </div>
        </div>
        <div class="rright">
          <span class="badge ${c.cls}">${c.label}</span>
          <span class="ddate">${date}</span>
        </div>
      </li>`;
    });
    document.getElementById("cHot").textContent  = hot;
    document.getElementById("cWarm").textContent = warm;
    document.getElementById("cCold").textContent = cold;
    document.getElementById("totalAcq").textContent = rows.length;
    el.innerHTML = items.length ? items.join("") : `<li class="empty">Aucun acquéreur enregistré.</li>`;
  } catch(e){
    el.innerHTML = `<li class="empty">Erreur de chargement.</li>`;
    ["cHot","cWarm","cCold"].forEach(id => document.getElementById(id).textContent = "0");
  }
}

async function loadVend(ag){
  const el = document.getElementById("listVend");
  try{
    const tbl = await fetchSheet(VEND_ID, "Vendeurs");
    const rows = (tbl.rows||[]).filter(r => cv(r,10).toUpperCase() === ag);
    const items = rows.map(r => {
      const nom    = stripEmail(cv(r,1));
      const type   = cv(r,4);
      const adresse= cv(r,5), prix = cv(r,6);
      const delai  = cv(r,7), date = cv(r,0);
      const ville = adresse
        ? adresse.split(/[,\n]/).map(s=>s.trim()).filter(Boolean).pop() || adresse
        : "—";
      return `<li class="rrow">
        <div class="rleft">
          <div class="rname">${nom||"—"}</div>
          <div class="rmeta">
            ${type  ? `<span class="chip">${type}</span>` : ""}
            <span class="ville">${ville}</span>
            ${delai ? `<span class="delai-txt">${delai}</span>` : ""}
          </div>
        </div>
        <div class="rright">
          <span class="price">${fmtPrix(prix)}</span>
          <span class="ddate">${date}</span>
        </div>
      </li>`;
    });
    document.getElementById("totalVend").textContent = rows.length;
    el.innerHTML = items.length ? items.join("") : `<li class="empty">Aucun bien enregistré.</li>`;
  } catch(e){
    el.innerHTML = `<li class="empty">Erreur de chargement.</li>`;
    document.getElementById("totalVend").textContent = "0";
  }
}

(async function init(){
  const ag = getAgence();
  document.getElementById("agencyLabel").textContent =
    ag ? `${ag} · ${NAMES[ag]||ag}` : "Agence inconnue";
  document.title = `Dashboard — ${NAMES[ag]||ag||"Liberty IA"}`;
  if(!ag) return;
  await Promise.all([loadAcq(ag), loadVend(ag)]);
})();
</script>

</body>
</html>
