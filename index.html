<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Prospects – Liberty IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #3B5BDB;
    --blue-light: #4C6EF5;
    --blue-dark: #2241C7;
    --chaud: #FF6B35;
    --tiede: #F59F00;
    --froid: #339AF0;
    --bg: #F0F4FF;
    --card: #FFFFFF;
    --text: #1A1F36;
    --muted: #6B7280;
    --border: #E2E8F0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

/* HEADER */
header {
background: var(–blue);
padding: 18px 24px;
display: flex;
align-items: center;
justify-content: space-between;
gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-mark {
width: 38px; height: 38px;
background: white;
border-radius: 10px;
display: flex; align-items: center; justify-content: center;
font-family: ‘Syne’, sans-serif;
font-weight: 800; font-size: 16px;
color: var(–blue);
flex-shrink: 0;
}
.header-title { font-family: ‘Syne’, sans-serif; color: white; }
.header-title h1 { font-size: 18px; font-weight: 700; line-height: 1.1; }
.header-title p { font-size: 12px; opacity: 0.75; margin-top: 2px; }
#agence-badge {
background: rgba(255,255,255,0.2);
color: white;
font-family: ‘Syne’, sans-serif;
font-weight: 700;
font-size: 13px;
padding: 5px 12px;
border-radius: 20px;
letter-spacing: 0.05em;
}

/* MAIN */
main { padding: 20px 16px 40px; max-width: 700px; margin: 0 auto; }

/* STATUS BAR */
#status-bar {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 18px; flex-wrap: wrap; gap: 8px;
}
#status-msg { font-size: 13px; color: var(–muted); }
#btn-refresh {
background: var(–blue);
color: white;
border: none;
padding: 8px 16px;
border-radius: 20px;
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
font-weight: 500;
cursor: pointer;
display: flex; align-items: center; gap: 6px;
transition: background 0.2s;
}
#btn-refresh:hover { background: var(–blue-dark); }
#btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
.spin { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* STAT CARDS */
.stats-grid {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 10px;
margin-bottom: 18px;
}
@media(max-width: 480px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
.stat-card {
background: var(–card);
border-radius: 14px;
padding: 14px 12px;
text-align: center;
border: 1px solid var(–border);
transition: transform 0.15s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-icon { font-size: 22px; margin-bottom: 4px; }
.stat-value {
font-family: ‘Syne’, sans-serif;
font-size: 26px; font-weight: 800;
line-height: 1;
}
.stat-label { font-size: 11px; color: var(–muted); margin-top: 4px; }
.card-total .stat-value { color: var(–blue); }
.card-chaud .stat-value { color: var(–chaud); }
.card-tiede .stat-value { color: var(–tiede); }
.card-froid .stat-value { color: var(–froid); }

/* FILTERS */
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn {
border: 1.5px solid var(–border);
background: var(–card);
color: var(–muted);
padding: 6px 14px;
border-radius: 20px;
font-size: 13px;
font-family: ‘DM Sans’, sans-serif;
cursor: pointer;
transition: all 0.15s;
}
.filter-btn:hover { border-color: var(–blue); color: var(–blue); }
.filter-btn.active { background: var(–blue); border-color: var(–blue); color: white; font-weight: 600; }
.filter-btn.f-chaud.active { background: var(–chaud); border-color: var(–chaud); color: white; }
.filter-btn.f-tiede.active { background: var(–tiede); border-color: var(–tiede); color: white; }
.filter-btn.f-froid.active { background: var(–froid); border-color: var(–froid); color: white; }

/* TABLE */
.table-wrap {
background: var(–card);
border-radius: 16px;
border: 1px solid var(–border);
overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead { background: #F8FAFF; }
th {
padding: 12px 14px;
text-align: left;
font-size: 11px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.06em;
color: var(–muted);
border-bottom: 1px solid var(–border);
}
td {
padding: 12px 14px;
font-size: 13px;
border-bottom: 1px solid #F1F5F9;
vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #F8FAFF; }

.badge {
display: inline-flex; align-items: center; gap: 4px;
padding: 3px 9px; border-radius: 20px;
font-size: 11px; font-weight: 600;
}
.badge-chaud { background: var(–chaud); color: white; }
.badge-tiede { background: var(–tiede); color: white; }
.badge-froid { background: var(–froid); color: white; }

.no-data {
text-align: center; padding: 40px 20px;
color: var(–muted); font-size: 14px;
}
.no-data .icon { font-size: 36px; margin-bottom: 10px; }

/* ERROR */
#error-box {
background: #FEF2F2; border: 1px solid #FECACA;
border-radius: 12px; padding: 16px;
font-size: 13px; color: #DC2626;
margin-bottom: 16px; display: none;
}
#debug-box {
background: #1A1F36; color: #A5B4FC;
border-radius: 12px; padding: 14px;
font-size: 11px; font-family: monospace;
margin-bottom: 16px; display: none;
word-break: break-all; white-space: pre-wrap;
}
</style>

</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">LIA</div>
    <div class="header-title">
      <h1>Dashboard Prospects</h1>
      <p>Liberty IA Automatisation</p>
    </div>
  </div>
  <div id="agence-badge">—</div>
</header>

<main>
  <div id="status-bar">
    <span id="status-msg">Chargement...</span>
    <button id="btn-refresh" onclick="loadData()">
      <span id="refresh-icon">↻</span> Actualiser
    </button>
  </div>

  <div id="error-box"></div>
  <div id="debug-box"></div>

  <div class="stats-grid">
    <div class="stat-card card-total">
      <div class="stat-icon">📋</div>
      <div class="stat-value" id="count-total">0</div>
      <div class="stat-label">Total leads</div>
    </div>
    <div class="stat-card card-chaud">
      <div class="stat-icon">🔥</div>
      <div class="stat-value" id="count-chaud">0</div>
      <div class="stat-label">Chauds</div>
    </div>
    <div class="stat-card card-tiede">
      <div class="stat-icon">⚡</div>
      <div class="stat-value" id="count-tiede">0</div>
      <div class="stat-label">Tièdes</div>
    </div>
    <div class="stat-card card-froid">
      <div class="stat-icon">❄️</div>
      <div class="stat-value" id="count-froid">0</div>
      <div class="stat-label">Froids</div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Tous</button>
    <button class="filter-btn f-chaud" onclick="setFilter('Chaud',this)">🔥 Chauds</button>
    <button class="filter-btn f-tiede" onclick="setFilter('Tiède',this)">⚡ Tièdes</button>
    <button class="filter-btn f-froid" onclick="setFilter('Froid',this)">❄️ Froids</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Score</th>
          <th>Nom</th>
          <th>Ville</th>
          <th>Horizon</th>
          <th>Budget</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="5" class="no-data"><div class="icon">⏳</div>Chargement des données…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
const SHEET_ID = '1-kSmjWfoaHe6fJYt1Qbuj1ZEOA2V815zxHDrXQ0j_Kc';
const SHEET_NAME = 'Réponses au formulaire 2';

// Colonnes par INDEX FIXE (0-based)
// A=0  B=1  C=2  D=3  E=4  F=5  G=6  H=7  (I=8 absent)  J=9  K=10
const COL = {
  horodateur : 0,   // A
  nom        : 1,   // B
  email      : 2,   // C
  telephone  : 3,   // D
  type       : 4,   // E
  ville      : 5,   // F
  budget     : 6,   // G
  horizon    : 7,   // H
  refDossier : 9,   // J
  agence     : 10   // K
};

// Score basé sur l'horizon
function scoreFromHorizon(h) {
  if (!h) return 'Froid';
  const s = h.toLowerCase();
  if (s.includes('immédiat') || s.includes('urgent') || s.includes('1 mois') || s.includes('moins')) return 'Chaud';
  if (s.includes('1') || s.includes('2') || s.includes('3') || s.includes('mois')) return 'Tiède';
  return 'Froid';
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let allRows = [];
let currentFilter = 'all';
let agenceCode = '';

// ─── INIT ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  agenceCode = (params.get('agence') || '').trim().toUpperCase();
  document.getElementById('agence-badge').textContent = agenceCode || 'TOUTES';
  loadData();
});

// ─── LOAD ────────────────────────────────────────────────────────────────────
function loadData() {
  setStatus('Chargement…', true);
  hideError();

  // JSONP pur — aucun fetch(), zéro CORS
  // Google gviz accepte : tqx=responseHandler:monCallback
  const callbackName = 'lia_cb_' + Date.now();

  const src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
              '/gviz/tq?tqx=responseHandler:' + callbackName +
              '&sheet=' + encodeURIComponent(SHEET_NAME);

  window[callbackName] = function(data) {
    clearTimeout(timer);
    delete window[callbackName];
    if (scriptEl && scriptEl.parentNode) scriptEl.parentNode.removeChild(scriptEl);
    parseGviz(data);
  };

  const scriptEl = document.createElement('script');
  scriptEl.src = src;
  scriptEl.onerror = function() {
    clearTimeout(timer);
    delete window[callbackName];
    showError('Impossible de contacter Google Sheets. Vérifiez que le classeur est bien public "Tous les utilisateurs ayant le lien".');
    setStatus('Erreur', false);
  };

  const timer = setTimeout(function() {
    delete window[callbackName];
    if (scriptEl && scriptEl.parentNode) scriptEl.parentNode.removeChild(scriptEl);
    showError('Délai dépassé. Réessayez dans quelques secondes.');
    setStatus('Erreur', false);
  }, 12000);

  document.head.appendChild(scriptEl);
}

// ─── PARSE ───────────────────────────────────────────────────────────────────
function parseGviz(data) {
  try {
    const rows = data.table ? data.table.rows : [];
    const cols = data.table ? data.table.cols : [];

    showDebug('Colonnes reçues (' + cols.length + ') : ' +
      cols.map((c,i) => i + '=' + (c.label || '[vide]')).join(', ') +
      '\nLignes : ' + rows.length);

    allRows = [];

    rows.forEach(row => {
      if (!row || !row.c) return;
      const c = row.c;

      const get = (idx) => {
        if (!c[idx] || c[idx].v === null || c[idx].v === undefined) return '';
        return String(c[idx].v).trim();
      };

      const refDossier = get(COL.refDossier).toUpperCase();
      const agenceVal  = get(COL.agence).toUpperCase();

      // Filtre agence : on accepte la ligne si le code correspond à J ou K
      if (agenceCode) {
        if (refDossier !== agenceCode && agenceVal !== agenceCode) return;
      }

      const horizon = get(COL.horizon);
      const score   = scoreFromHorizon(horizon);

      allRows.push({
        nom      : get(COL.nom)      || 'Anonyme',
        email    : get(COL.email),
        tel      : get(COL.telephone),
        type     : get(COL.type),
        ville    : get(COL.ville)    || '—',
        budget   : get(COL.budget)   || '—',
        horizon  : horizon           || '—',
        score    : score,
        ref      : refDossier || agenceVal,
      });
    });

    renderStats();
    renderTable();
    setStatus('Mis à jour · ' + new Date().toLocaleTimeString('fr-FR'), false);
  } catch(e) {
    showError('Erreur de parsing : ' + e.message);
    setStatus('Erreur', false);
  }
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderStats() {
  const chauds = allRows.filter(r => r.score === 'Chaud').length;
  const tièdes = allRows.filter(r => r.score === 'Tiède').length;
  const froids = allRows.filter(r => r.score === 'Froid').length;

  document.getElementById('count-total').textContent = allRows.length;
  document.getElementById('count-chaud').textContent = chauds;
  document.getElementById('count-tiede').textContent = tièdes;
  document.getElementById('count-froid').textContent = froids;
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  const filtered = currentFilter === 'all'
    ? allRows
    : allRows.filter(r => r.score === currentFilter);

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="no-data"><div class="icon">📭</div>Aucun prospect' +
      (agenceCode ? ' pour ' + agenceCode : '') + '</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(r => {
    const cls  = r.score === 'Chaud' ? 'badge-chaud' : r.score === 'Tiède' ? 'badge-tiede' : 'badge-froid';
    const icon = r.score === 'Chaud' ? '🔥' : r.score === 'Tiède' ? '⚡' : '❄️';
    return '<tr>' +
      '<td><span class="badge ' + cls + '">' + icon + ' ' + r.score + '</span></td>' +
      '<td><strong>' + esc(r.nom) + '</strong></td>' +
      '<td>' + esc(r.ville) + '</td>' +
      '<td>' + esc(r.horizon) + '</td>' +
      '<td>' + esc(r.budget) + '</td>' +
    '</tr>';
  }).join('');
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function setStatus(msg, loading) {
  document.getElementById('status-msg').textContent = msg;
  const icon = document.getElementById('refresh-icon');
  const btn  = document.getElementById('btn-refresh');
  icon.className = loading ? 'spin' : '';
  icon.textContent = '↻';
  btn.disabled = loading;
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.style.display = 'block';
  box.textContent = msg;
}
function hideError() {
  document.getElementById('error-box').style.display = 'none';
}
function showDebug(msg) {
  // Activer en ajoutant ?debug=1 dans l'URL
  const params = new URLSearchParams(window.location.search);
  if (!params.get('debug')) return;
  const box = document.getElementById('debug-box');
  box.style.display = 'block';
  box.textContent = msg;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>

</body>
</html>
