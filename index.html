<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Prospects – Liberty IA</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --blue:#1E3A8A;
  --blue-light:#2563EB;
  --chaud:#DC2626;
  --tiede:#D97706;
  --froid:#2563EB;
  --vendeur:#059669;
  --bg:#F8FAFC;
  --card:#FFFFFF;
  --text:#0F172A;
  --muted:#64748B;
  --border:#E2E8F0;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

/* ================= HEADER ================= */

header{
  background:#1E3A8A;
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-mark{
  width:34px;
  height:34px;
  background:white;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:13px;
  color:#1E3A8A;
  flex-shrink:0;
}

.header-title h1{
  font-family:'Syne',sans-serif;
  font-size:15px;
  font-weight:700;
  color:white;
}

.header-title p{
  font-size:11px;
  color:rgba(255,255,255,0.8);
  margin-top:1px;
}

#agence-badge{
  background:white;
  color:#1E3A8A;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:12px;
  padding:4px 11px;
  border-radius:20px;
  letter-spacing:0.08em;
  white-space:nowrap;
}

/* ================= MAIN ================= */

main{
  padding:14px 10px 40px;
  width:100%;
  max-width:100%;
  margin:0 auto;
  overflow-x:hidden;
}

/* ================= STATUS ================= */

#status-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
  gap:8px;
}

#status-msg{
  font-size:12px;
  color:var(--muted);
}

#btn-refresh{
  background:var(--blue);
  color:white;
  border:none;
  padding:7px 13px;
  border-radius:20px;
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:5px;
  white-space:nowrap;
  flex-shrink:0;
}

#btn-refresh:disabled{
  background:#93A4E0 !important;
  cursor:not-allowed;
}

.spin{
  display:inline-block;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

/* ================= TITLES ================= */

.section-title{
  font-family:'Syne',sans-serif;
  font-size:14px;
  font-weight:700;
  color:var(--text);
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:6px;
}

.pill{
  font-size:10px;
  font-weight:700;
  padding:2px 7px;
  border-radius:20px;
  background:var(--blue);
  color:white;
}

.pill-green{
  background:var(--vendeur);
}

/* ================= STATS ================= */

.stats-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-bottom:14px;
  width:100%;
}

.stat-card{
  background:var(--card);
  border-radius:12px;
  padding:12px 10px;
  text-align:center;
  border:1px solid var(--border);
}

.stat-icon{
  font-size:18px;
  margin-bottom:3px;
}

.stat-value{
  font-family:'Syne',sans-serif;
  font-size:24px;
  font-weight:800;
  line-height:1;
}

.stat-label{
  font-size:10px;
  color:var(--muted);
  margin-top:3px;
}

.card-total .stat-value{
  color:var(--blue);
}

.card-chaud .stat-value{
  color:var(--chaud);
}

.card-tiede .stat-value{
  color:var(--tiede);
}

.card-froid .stat-value{
  color:var(--froid);
}

/* ================= VENDEURS CARD ================= */

.card-vendeur{
  background:linear-gradient(135deg,#ECFDF5,#D1FAE5);
  border-radius:12px;
  padding:12px 14px;
  border:1px solid #A7F3D0;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
  width:100%;
}

.card-vendeur .v-icon{
  font-size:26px;
}

.card-vendeur .v-value{
  font-family:'Syne',sans-serif;
  font-size:28px;
  font-weight:800;
  color:var(--vendeur);
  line-height:1;
}

.card-vendeur .v-label{
  font-size:11px;
  color:#065F46;
  margin-top:2px;
}

/* ================= FILTERS ================= */

.filters{
  display:flex;
  gap:6px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.filter-btn{
  border:1.5px solid var(--border);
  background:var(--card);
  color:var(--muted);
  padding:5px 11px;
  border-radius:20px;
  font-size:12px;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
}

.filter-btn.active{
  background:var(--blue);
  border-color:var(--blue);
  color:white;
  font-weight:600;
}

.filter-btn.f-chaud.active{
  background:var(--chaud);
  border-color:var(--chaud);
}

.filter-btn.f-tiede.active{
  background:var(--tiede);
  border-color:var(--tiede);
  color:#7A4F00;
}

.filter-btn.f-froid.active{
  background:var(--froid);
  border-color:var(--froid);
}

/* ================= TABLES ================= */

.table-wrap{
  width:100%;
  background:var(--card);
  border-radius:14px;
  border:1px solid var(--border);
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  margin-bottom:6px;
}

table{
  width:100%;
  min-width:100%;
  border-collapse:collapse;
}

thead{
  background:#F8FAFF;
}

.table-wrap-vendeurs thead{
  background:#F0FDF4;
}

th{
  padding:9px 8px;
  text-align:left;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.05em;
  color:var(--muted);
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}

.table-wrap-vendeurs th{
  color:#065F46;
}

td{
  padding:9px 8px;
  font-size:12px;
  border-bottom:1px solid #F1F5F9;
  vertical-align:middle;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

tr:last-child td{
  border-bottom:none;
}

tr:hover td{
  background:#F8FAFF;
}

.table-wrap-vendeurs tr:hover td{
  background:#F0FDF4;
}

/* ================= ACQUEREURS ================= */

#tbl-acq{
  table-layout:auto;
}

#tbl-acq th,
#tbl-acq td{
  font-size:11px;
  padding:8px 6px;
}

/* ================= VENDEURS ================= */

#tbl-ven{
  table-layout:fixed;
  width:100%;
}

#tbl-ven th,
#tbl-ven td{
  font-size:11px;
  padding:8px 5px;
}

#tbl-ven .col-vnom{
  width:28%;
}

#tbl-ven .col-vtype{
  width:24%;
}

#tbl-ven .col-vville{
  width:18%;
}

#tbl-ven .col-vprix{
  width:18%;
}

#tbl-ven .col-vdate{
  width:12%;
}

/* ================= BADGES ================= */

.badge{
  display:inline-flex;
  align-items:center;
  gap:3px;
  padding:2px 6px;
  border-radius:20px;
  font-size:10px;
  font-weight:700;
  white-space:nowrap;
}

.badge-chaud{
  background:var(--chaud);
  color:white;
}

.badge-tiede{
  background:var(--tiede);
  color:#7A4F00;
}

.badge-froid{
  background:var(--froid);
  color:white;
}

.badge-type{
  background:#ECFDF5;
  color:#065F46;
  border:1px solid #A7F3D0;
  font-size:10px;
  padding:2px 6px;
  border-radius:20px;
  white-space:nowrap;
}

/* ================= CELLS ================= */

.prix-cell{
  font-weight:600;
  font-size:11px;
}

.date-cell{
  font-size:10px;
  color:var(--muted);
}

.no-data{
  text-align:center;
  padding:28px 12px;
  color:var(--muted);
  font-size:12px;
}

.no-data .icon{
  font-size:28px;
  margin-bottom:6px;
}

.section-divider{
  height:1px;
  background:var(--border);
  margin:22px 0 16px;
}

/* ================= BOXES ================= */

#error-box{
  background:#FEF2F2;
  border:1px solid #FECACA;
  border-radius:10px;
  padding:12px;
  font-size:12px;
  color:#DC2626;
  margin-bottom:12px;
  display:none;
}

#debug-box{
  background:#1A1F36;
  color:#A5B4FC;
  border-radius:10px;
  padding:12px;
  font-size:10px;
  font-family:monospace;
  margin-bottom:12px;
  display:none;
  word-break:break-all;
  white-space:pre-wrap;
}

/* ================= MOBILE ================= */

@media (max-width:430px){

  .header-title h1{
    font-size:14px;
  }

  .header-title p{
    font-size:10px;
  }

  #agence-badge{
    font-size:10px;
    padding:4px 8px;
  }

  .stat-value{
    font-size:22px;
  }

  .filters{
    gap:5px;
  }

  .filter-btn{
    font-size:11px;
    padding:5px 9px;
  }

  #tbl-acq th,
  #tbl-acq td,
  #tbl-ven th,
  #tbl-ven td{
    font-size:10px;
    padding:7px 4px;
  }

}

</style>
</head>

<body>

<header>
  <div class="header-left">
    <div class="logo-mark">LIA</div>

    <div class="header-title">
      <h1>Dashboard Prospects</h1>
      <p>Liberty IA Automatisation</p>
    </div>
  </div>

  <div id="agence-badge">—</div>
</header>

<main>

  <div id="status-bar">
    <span id="status-msg">Chargement...</span>

    <button id="btn-refresh" onclick="loadAll()">
      <span id="refresh-icon">↻</span>
      Actualiser
    </button>
  </div>

  <div id="error-box"></div>
  <div id="debug-box"></div>

  <!-- ACQUEREURS -->

  <div class="section-title">
    🏠 Acquéreurs
    <span class="pill" id="pill-acquereurs">0</span>
  </div>

  <div class="stats-grid">

    <div class="stat-card card-total">
      <div class="stat-icon">📋</div>
      <div class="stat-value" id="count-total">0</div>
      <div class="stat-label">Total leads</div>
    </div>

    <div class="stat-card card-chaud">
      <div class="stat-icon">🔥</div>
      <div class="stat-value" id="count-chaud">0</div>
      <div class="stat-label">Chauds</div>
    </div>

    <div class="stat-card card-tiede">
      <div class="stat-icon">⚡</div>
      <div class="stat-value" id="count-tiede">0</div>
      <div class="stat-label">Tièdes</div>
    </div>

    <div class="stat-card card-froid">
      <div class="stat-icon">❄️</div>
      <div class="stat-value" id="count-froid">0</div>
      <div class="stat-label">Froids</div>
    </div>

  </div>

</main>

</body>
</html>
